name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # Library + binary build (the `cypher-mcp` bin needs --all-features).
      - run: cargo build --all-targets --all-features
      # Default-feature build catches accidental dep leakage from `mcp`
      # into the lean library config that downstream consumers see.
      - run: cargo build --lib
      - run: cargo test --all-features
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo fmt --check
