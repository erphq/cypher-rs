# Cargo + GitHub Actions ecosystems. Cargo bumps come in
# individually so we can review semver impact on consumers; dev-only
# updates are batched in a small group to keep noise low.

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "13:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "automated"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "13:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "automated"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
